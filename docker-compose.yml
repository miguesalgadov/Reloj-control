services:
  db:
    image: postgis/postgis:16-3.4
    container_name: reloj_control_db
    environment:
      POSTGRES_DB: reloj_control
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - reloj_pgdata:/var/lib/postgresql/data
      - ./db/bootstrap:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reloj_control"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: reloj_control_api
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  reloj_pgdata:
